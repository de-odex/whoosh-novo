name: Ruff

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags-ignore: ["**"]
    paths:
      - ".github/workflows/ruff.yml"
      - "src/**"
      - "tests/**"
      - "noxfile.py"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - ".github/workflows/ruff.yml"
      - "src/**"
      - "tests/**"
      - "noxfile.py"
      - "pyproject.toml"
      - "uv.lock"

concurrency:
  group: ruff-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Ruff
        run: uv run --group dev ruff check --output-format=github .
